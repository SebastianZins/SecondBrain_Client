<sb-change-metadata-dialog
  [(isVisible)]="isChangeMetadataDialogVisible"
  [sectionData]="data"
/>

<div class="section list-section">
  <div class="section-header" #topBar>
    <div class="section-header-titles">
      <h2>{{ data.title }}</h2>
      <h3>{{ data.subtitle }}</h3>
    </div>
    <div class="button-group">
      <p-button
        icon="pi pi-save"
        [rounded]="true"
        size="small"
        [text]="true"
        (onClick)="saveData()"
        *ngIf="isDataChanged"
      ></p-button>
      <p-button
        icon="pi pi-ellipsis-v"
        [rounded]="true"
        size="small"
        [text]="true"
        (onClick)="topBarMenuContext.show($event)"
      ></p-button>
      <p-contextmenu
        #topBarMenuContext
        [target]="topBar"
        [model]="contextMenuItems"
      />
    </div>
  </div>
  <div class="section-body">
    <ul (blur)="resetSelection()">
      <li
        (keydown)="onItemKeydown($event)"
        (keyup)="onItemKeyup($event)"
        #listItem
        *ngFor="let item of data.items; index as i"
        [class.list-item-selected]="isSelected(i)"
        (click)="onItemClick(i)"
      >
        <div class="list-section-item">
          <sb-styled-text
            tabindex="0"
            class="styled-text"
            *ngIf="!isActive(i)"
            [text]="item.value"
          >
          </sb-styled-text>
          <input
            pInputText
            type="text"
            class="list-section-input"
            [(ngModel)]="item.value"
            (ngModelChange)="isDataChanged = true"
            (keydown.enter)="updateData(item.value, i)"
            *ngIf="isActive(i)"
          />
        </div>
      </li>
      <li>
        <input
          #newInput
          class="list-section-input"
          pInputText
          type="text"
          placeholder="..."
          [(ngModel)]="newItem"
          (ngModelChange)="isDataChanged = true"
          (keydown)="onNewItemKeyUp($event)"
        />
      </li>
    </ul>
  </div>
</div>
