<p-dialog
  header="Update Section Data"
  [(visible)]="isVisible"
  class="update-file-section-data-dialog"
  [dismissableMask]="true"
  [draggable]="false"
  [modal]="true"
  (onHide)="onClose()"
>
  <article class="section-input">
    <p-table [value]="sectionData" [resizableColumns]="true">
      <ng-template #header>
        <tr>
          <th style="width: 3rem"></th>
          <th>Title</th>
          <th>Is Visible</th>
          <th>Is Expanded</th>
          <th>Action</th>
        </tr>
      </ng-template>
      <ng-template #body let-section let-index="rowIndex">
        <tr [pReorderableRow]="index" (dragend)="elementsDraged = true">
          <td>
            <span class="pi pi-bars" pReorderableRowHandle></span>
          </td>
          <th>{{ section.title }}</th>
          <th>
            <p-toggleswitch [(ngModel)]="section.isVisible" />
          </th>
          <th>
            <p-toggleswitch [(ngModel)]="section.isExpanded" />
          </th>
          <th>
            <p-button
              icon="pi pi-trash"
              [outlined]="true"
              (click)="deleteSection(section.id)"
            ></p-button>
          </th>
        </tr>
      </ng-template>
    </p-table>
    <div class="button-group">
      <p-button
        label="Cancel"
        [text]="true"
        severity="secondary"
        (click)="onClose()"
      ></p-button>
      <p-button label="Update Data" (click)="updateData()"></p-button>
    </div>
  </article>
</p-dialog>
