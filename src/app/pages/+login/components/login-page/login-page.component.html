<div class="page">
  <div class="center-cell">
    <div class="input-row">
      <label for="login-mail">Mail</label>
      <input
        id="login-mail"
        type="text"
        pInputText
        [(ngModel)]="mail"
        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"
      />
    </div>
    <div class="input-row">
      <label for="login-password">Password</label>
      <p-password [(ngModel)]="password" />
    </div>
    <div class="button-group">
      <p-button icon="pi pi-iconName" label="Register"></p-button>
      <p-button
        icon="pi pi-iconName"
        label="Login"
        [disabled]="
          password === null ||
          password.length === 0 ||
          mail === null ||
          mail.length === 0
        "
        (onClick)="login()"
      ></p-button>
    </div>
  </div>
</div>
